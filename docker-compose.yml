version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: momentumos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-momentum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-momentum_secret}
      POSTGRES_DB: ${POSTGRES_DB:-momentumos}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-momentum}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
